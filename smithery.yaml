name: emoji-ai-mcp
description: Emoji search, text-based suggestions, emoji-to-text conversion, and counting.
version: 1.0.0
tools:
- name: search_emoji
  description: Search for emojis by keyword or name.
  parameters:
  - name: query
    type: string
    required: true
  - name: limit
    type: integer
    required: false
- name: suggest_for_text
  description: Suggest relevant emojis for a given text based on sentiment/content.
  parameters:
  - name: text
    type: string
    required: true
  - name: max_suggestions
    type: integer
    required: false
- name: emoji_to_text
  description: Convert emojis in text to their text descriptions.
  parameters:
  - name: text
    type: string
    required: true
- name: count_emojis
  description: Count and categorize emojis in text.
  parameters:
  - name: text
    type: string
    required: true
